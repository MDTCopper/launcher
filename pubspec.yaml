name: copperlauncher_main
description: "A LauncherApp for Mindustry, 这是为Mindustry开发的一款游戏启动器 "

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  window_manager: ^0.5.1
  uuid:  ^4.5.1
  intl: ^0.20.2
  dio: ^5.9.0
  path_provider: ^2.1.0
  path: ^1.8.3
  http_proxy_override: ^1.0.1
  font_awesome_flutter: ^10.10.0
  flutter_svg: ^2.2.1
  line_icons: ^2.0.3
  json_annotation: ^4.9.0
  system_info2: ^4.1.0
  url_launcher: ^6.3.2
  open_filex: ^4.7.0
  desktop_drop: ^0.7.0
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1
  html2md: ^1.3.2
  html: ^0.15.6
  flutter_html: ^3.0.0
  webview_flutter: ^4.13.1
  xml: ^6.6.1
  string_similarity: ^2.1.1
  mime: ^2.0.0
  archive: ^4.0.9
  hjson_dart: ^0.1.1
  properties: ^2.1.1
  async: ^2.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.0
  json_serializable: ^6.11.1


flutter:
  assets:
    - assets/images/
    - assets/text_assets/
  uses-material-design: true
  fonts:
    - family: sc
      fonts:
        - asset: assets/fonts/SourceHanSansSC-Light-2.otf
